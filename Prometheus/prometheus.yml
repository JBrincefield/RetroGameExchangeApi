global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: api
    metrics_path: /metrics
    static_configs:
      - targets:
          - api1:8080
          - api2:8080

  - job_name: email-worker
    metrics_path: /metrics
    static_configs:
      - targets:
          - email-worker:9091

  - job_name: kafka
    static_configs:
      - targets:
          - kafka-exporter:9308

  - job_name: nginx
    static_configs:
      - targets:
          - nginx-exporter:9113
